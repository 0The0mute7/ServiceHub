<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#146c5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ServiceHub" />
    <link rel="manifest" href="./manifest.json" />
    <title>Dashboard | ServiceHub</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="index.html" title="ServiceHub">📱</a>
      <nav class="nav">
        <a href="services.html" title="Services">🔍</a>
        <a href="create-service.html" title="Create">➕</a>
        <a href="dashboard.html" title="Dashboard">📊</a>
        <a href="profile.html" title="Profile">👤</a>
      </nav>
      <div style="flex: 1;"></div>
      <a href="login.html" data-guest-only hidden title="Login">🔐</a>
      <a href="register.html" data-guest-only hidden title="Register">✏️</a>
      <button type="button" data-auth-only data-logout hidden title="Logout">🚪</button>
    </aside>

    <main class="page">
      <h1 class="page-title">Dashboard</h1>
      <p class="lead">Signed in as <strong id="dashboardUser"></strong></p>
      <section class="dashboard-band">
        <article class="service-card">
          <h3>My services</h3>
          <strong id="serviceCount">0</strong>
        </article>
        <article class="service-card">
          <h3>Create listing</h3>
          <p>Add a service to the marketplace.</p>
          <a class="button" href="create-service.html">Create</a>
        </article>
      </section>
      <section class="toolbar dashboard-heading">
        <div>
          <h2>My Listings</h2>
          <p class="notice">Manage the services you created.</p>
        </div>
      </section>
      <section class="service-grid" id="myServicesList"></section>
      <section class="toolbar dashboard-heading">
        <div>
          <h2>Inbox</h2>
          <p class="notice">Conversations with buyers and providers.</p>
        </div>
        <button class="button secondary" id="inboxToggle" aria-expanded="false">Show</button>
      </section>
      <section class="service-grid" id="inboxList" style="display: none;"></section>
      <p class="notice" id="dashboardMessage"></p>
    </main>
  </body>
</html>
