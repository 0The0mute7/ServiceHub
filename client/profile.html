<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#146c5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ServiceHub" />
    <link rel="manifest" href="./manifest.json" />
    <title>Profile | ServiceHub</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="index.html" title="ServiceHub">📱</a>
      <nav class="nav">
        <a href="services.html" title="Services">🔍</a>
        <a href="create-service.html" data-auth-only hidden title="Create">➕</a>
        <a href="dashboard.html" data-auth-only hidden title="Dashboard">📊</a>
        <a href="profile.html" data-auth-only hidden title="Profile">👤</a>
      </nav>
      <div style="flex: 1;"></div>
      <button type="button" data-logout data-auth-only hidden title="Logout">🚪</button>
    </aside>

    <main class="page">
      <h1 class="page-title">My Profile</h1>
      <form class="form-shell form-grid" id="profileForm">
        <label>
          Name
          <input id="profileName" name="name" type="text" required />
        </label>
        <label>
          Email
          <input id="profileEmail" name="email" type="email" disabled />
        </label>
        <button class="button" type="submit">Save Profile</button>
        <p class="notice" id="formMessage"></p>
      </form>
    </main>
  </body>
</html>
