<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#146c5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ServiceHub" />
    <link rel="manifest" href="./manifest.json" />
    <title>Messages | ServiceHub</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <aside class="sidebar">
      <a class="brand" href="index.html" title="ServiceHub">📱</a>
      <nav class="nav">
        <a href="services.html" title="Services">🔍</a>
        <a href="create-service.html" data-auth-only hidden title="Create">➕</a>
        <a href="dashboard.html" title="Dashboard">📊</a>
        <a href="profile.html" title="Profile">👤</a>
      </nav>
      <div style="flex: 1;"></div>
      <a href="login.html" data-guest-only hidden title="Login">🔐</a>
      <a href="register.html" data-guest-only hidden title="Register">✏️</a>
      <button type="button" data-auth-only data-logout hidden title="Logout">🚪</button>
    </aside>

    <main class="page">
      <h1 class="page-title">Messages</h1>
      <section class="thread" id="messageThread"></section>
      <form class="message-compose" id="messageForm">
        <textarea id="messageContent" name="content" required></textarea>
        <button class="button" type="submit">Send</button>
      </form>
      <p class="notice" id="messagePageNotice"></p>
    </main>
  </body>
</html>
